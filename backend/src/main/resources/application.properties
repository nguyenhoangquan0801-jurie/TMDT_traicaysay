spring.application.name=NongLamFood

server.port=8080

# ===============================
# SQL SERVER
# ===============================

spring.datasource.url=jdbc:sqlserver://QUAN_KHONG_NGU\SQLEXPRESS;databaseName=NongLamFood;encrypt=true;trustServerCertificate=true

spring.datasource.username=sa
spring.datasource.password=Admin@123

spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ===============================
# JPA
# ===============================

spring.jpa.hibernate.ddl-auto=none

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

# ===============================
# JWT
# ===============================

jwt.secret=1234567890123456789012345678901234567890123456789012345678901234

jwt.expiration=86400000