# ===================================================================
# 1. CẤU HÌNH CHUNG CỦA ỨNG DỤNG
# ===================================================================
spring.application.name=traicaysay

# Cấu hình đường dẫn cho các file giao diện JSP (nếu dự án dùng JSP)
#spring.mvc.view.prefix=/WEB-INF/views/
#spring.mvc.view.suffix=.jsp

# ===================================================================
# 2. CẤU HÌNH DATABASE (HIỆN TẠI ĐANG DÙNG H2 DATABASE TRONG RAM)
# ===================================================================
# Ghi chú: Nếu muốn chuyển sang dùng MySQL, hãy thêm dấu # vào trước các dòng H2 
# và mở dấu # ở các dòng MySQL phía dưới cùng ra.

spring.datasource.url=jdbc:h2:mem:nonglamfood_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Bật giao diện quản lý Database của H2 (Truy cập: http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===================================================================
# 3. CẤU HÌNH KHỞI TẠO DỮ LIỆU (QUAN TRỌNG ĐỂ FIX LỖI ĐĂNG NHẬP)
# ===================================================================
# Khai báo loại ngôn ngữ DB cho Hibernate hiểu
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Ép hệ thống XÓA bảng cũ và TẠO LẠI bảng hoàn toàn mới từ file schema.sql khi khởi động
spring.jpa.hibernate.ddl-auto=create-drop

# In các câu lệnh SQL ra Terminal để bạn dễ theo dõi (SELECT, INSERT...)
spring.jpa.show-sql=true

# Luôn luôn kích hoạt và chạy các file script sql (schema.sql và data.sql) khi khởi động app
spring.sql.init.mode=always

# Ép Spring Boot chạy file data.sql SAU KHI Hibernate đã khởi tạo bảng xong
spring.jpa.defer-datasource-initialization=true

# (Tùy chọn) Đảm bảo chế độ ddl-auto được đặt là update hoặc create-drop để Hibernate tự thêm cột username
spring.jpa.hibernate.ddl-auto=update

# ===================================================================
# 4. CẤU HÌNH ĐĂNG NHẬP BẰNG GOOGLE (OAUTH2 CLIENT)
# ===================================================================
# ⚠️ CHÚ Ý: Bạn BẮT BUỘC phải thay 2 chuỗi dưới đây bằng mã thật bạn tạo trên Google Cloud Console!
# Nếu dùng mã ví dụ 1234567890 này, Google sẽ báo lỗi "401: invalid_client" ngay lập tức.
spring.security.oauth2.client.registration.google.client-id=MÃ_GOOGLE_CLIENT_ID_CỦA_BẠN_Ở_ĐÂY
spring.security.oauth2.client.registration.google.client-secret=MÃ_SECRET_CỦA_BẠN_Ở_ĐÂY
spring.security.oauth2.client.registration.google.scope=profile,email

