<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${product != null} ? ${product.name} + ' - Nonglamfood' : 'Sản phẩm không tồn tại'">Chi tiết sản phẩm</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .product-img { max-width: 100%; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .price { color: #d9534f; font-size: 1.8rem; font-weight: bold; }
        .faq-section { margin-top: 40px; padding: 25px; background: #fdfdfd; border-radius: 10px; border: 1px solid #eee; }
        .review-card { border-left: 5px solid #008a45; }
    </style>
</head>
<body>

<div class="container mt-5">
    <div th:if="${product != null}" class="row">
        <div class="col-md-6 text-center">
            <img th:src="@{${product.imageUrl}}" class="product-img" th:alt="${product.name}">
        </div>
        <div class="col-md-6">
            <h1 class="mb-3" th:text="${product.name}">Tên sản phẩm</h1>
            <p class="price" th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'">Giá</p>
            <p class="text-muted" th:text="${product.description}">Mô tả sản phẩm...</p>
            <button class="btn btn-success btn-lg mt-3">Thêm vào giỏ hàng</button>
        </div>
    </div>

    <div th:unless="${product != null}" class="alert alert-warning">
        Sản phẩm bạn đang tìm kiếm hiện không tồn tại!
    </div>

    <div class="row mt-5">
        <div class="col-md-8">
            <h3 class="mb-4">Đánh giá của khách hàng</h3>
            
            <div th:if="${#lists.isEmpty(reviews)}" class="text-muted italic">Chưa có đánh giá nào.</div>
            
            <div th:each="review : ${reviews}" class="card mb-3 p-3 review-card">
                <strong th:text="${review.userName}">Tên người dùng</strong>
                <p class="mb-1" th:text="${review.content}">Nội dung...</p>
                <small class="text-muted" th:text="${#temporals.format(review.createdAt, 'dd/MM/yyyy HH:mm')}">Thời gian</small>
            </div>

            <div class="faq-section">
                <h3 class="mb-4">Hỏi đáp về sản phẩm</h3>
                <div th:if="${#lists.isEmpty(answeredQuestions)}" class="text-muted">Chưa có câu hỏi nào.</div>
                
                <div th:each="q : ${answeredQuestions}" class="mb-4 pb-3 border-bottom">
                    <p class="mb-1"><strong>Q: </strong> <span th:text="${q.content}"></span></p>
                    
                    <div th:each="reply : ${q.replies}" class="text-success mb-0" style="padding-left: 20px;">
                        <strong>A: </strong> <span th:text="${reply.content}">Nội dung phản hồi</span>
                    </div>
                    
                    <p th:if="${#lists.isEmpty(q.replies)}" class="text-muted mb-0" style="padding-left: 20px;">
                        <em>Đang chờ quản trị viên phản hồi...</em>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="container mt-4">
    <div th:replace="~{fragments/interaction-fragment :: productInteraction}"></div>
</div>

</body>
</html>
