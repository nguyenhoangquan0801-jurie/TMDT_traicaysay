<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - Nonglamfood</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .login-card h2 { color: #008a45; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-submit { background-color: #008a45; color: white; border: none; width: 100%; padding: 12px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-submit:hover { background-color: #006b35; }
        .error-msg { color: red; margin-bottom: 15px; font-size: 14px; }
        .logout-msg { color: green; margin-bottom: 15px; font-size: 14px; }
        .divider { margin: 20px 0; border-top: 1px solid #eee; position: relative; }
        .divider span { position: absolute; top: -10px; background: white; padding: 0 10px; left: 50%; transform: translateX(-50%); color: #999; font-size: 13px; }
        .btn-google { display: flex; align-items: center; justify-content: center; gap: 10px; border: 1px solid #008a45; color: #008a45; background: white; padding: 10px; border-radius: 4px; text-decoration: none; font-weight: bold; transition: all 0.3s; margin-bottom: 15px; }
        .btn-google:hover { background-color: #008a45; color: white; }
        .link-register { display: block; margin-top: 20px; color: #008a45; text-decoration: none; font-size: 14px; }
        .link-register:hover { text-decoration: underline; color: #006b35; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>NONG LAM FOOD</h2>

    <div class="error-msg" th:if="${param.error}">
        Email hoặc mật khẩu không chính xác!
    </div>
    
    <div class="logout-msg" th:if="${param.logout}">
        Bạn đã đăng xuất thành công.
    </div>

    <div style="color: green; background-color: #f2fff2; padding: 8px; border-left: 3px solid green; margin-bottom: 15px; font-size: 14px; text-align: left;" 
         th:if="${param.success}">
        Đăng ký tài khoản thành công! Xin mời bạn đăng nhập bằng tài khoản vừa tạo.
    </div>

    <form th:action="@{/login}" method="POST">
        <div class="form-group">
            <label>Email hoặc Tên đăng nhập</label>
            <input type="text" name="username" placeholder="admin@nonglamfood.com hoặc admin_nonglam" required>
        </div>
        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" name="password" placeholder="******" required>
        </div>
        <button type="submit" class="btn-submit">Đăng nhập</button>
    </form>

    <div class="divider"><span>HOẶC</span></div>

    <a th:href="@{/oauth2/authorization/google}" class="btn-google">
        <i class="fa fa-google" style="font-size: 18px;"></i> Tiếp tục với Google
    </a>

    <a th:href="@{/register}" class="link-register">Chưa có tài khoản? Đăng ký thành viên ngay</a>
</div>

</body>
</html>
