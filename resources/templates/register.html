<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký tài khoản - Nonglamfood</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .register-card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .register-card h2 { color: #008a45; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-submit { background-color: #008a45; color: white; border: none; width: 100%; padding: 12px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-submit:hover { background-color: #006b35; }
        .error-msg { color: red; margin-bottom: 15px; font-size: 14px; text-align: left; background: #fff2f2; padding: 8px; border-left: 3px solid red; }
        .link-login { display: block; margin-top: 15px; color: #008a45; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="register-card">
    <h2>ĐĂNG KÝ THÀNH VIÊN</h2>

    <div class="error-msg" th:if="${error}" th:text="${error}"></div>

    <form th:action="@{/register}" th:object="${userDto}" method="POST">
        <div class="form-group">
            <label>Họ và tên của bạn</label>
            <input type="text" th:field="*{fullName}" placeholder="Nguyễn Văn Người Dùng" required>
        </div>
        
        <div class="form-group">
            <label>Địa chỉ Email</label>
            <input type="email" th:field="*{email}" placeholder="example@gmail.com" required>
        </div>
        
        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" th:field="*{password}" placeholder="******" required>
        </div>
        
        <div class="form-group">
            <label>Nhập lại mật khẩu</label>
            <input type="password" th:field="*{confirmPassword}" placeholder="******" required>
        </div>
        
        <button type="submit" class="btn-submit">Đăng ký ngay</button>
    </form>

    <a th:href="@{/login}" class="link-login">Đã có tài khoản? Quay lại đăng nhập</a>
</div>

</body>
</html>
